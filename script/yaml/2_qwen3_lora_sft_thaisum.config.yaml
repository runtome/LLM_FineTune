### model
model_name_or_path: Qwen/Qwen3-4B
# trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: all
# deepspeed: ${PROJECT_PATH}/script/deepspeed/ds_z2_config.json  # enable only if your cluster build is stable

### dataset
dataset: thai_news_summary
eval_dataset: thai_news_summary_validation
template: qwen3
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4
dataset_dir : ${PROJECT_PATH}/script
tokenized_path: ${PROJECT_PATH}/dataset/tokenized_dataset/thai_news_summary

### output
output_dir: ${PROJECT_PATH}/trained_model/qwen3-4b-thaisum-adapter/
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
do_eval: true
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 500
