### model
model_name_or_path: ${PROJECT_PATH}/trained_model/qwen3-4b-thaisum
template: qwen3
# trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: full

### dataset
eval_dataset: thai_news_summary_test
template: qwen3
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 16
dataset_dir : ${PROJECT_PATH}/script

### output
output_dir: ${PROJECT_PATH}/predictions/qwen3-4b-thaisum-test
overwrite_output_dir: true

### eval
per_device_eval_batch_size: 1
predict_with_generate: true
ddp_timeout: 180000000

### generation
max_new_tokens: 256
temperature: 0.0
