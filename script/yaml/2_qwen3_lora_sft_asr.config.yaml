### model
model_name_or_path: Qwen/Qwen3-8B
# trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_target: all
# deepspeed: ${PROJECT_PATH}/script/deepspeed/ds_z2_config.json  # disabled due to DeepSpeed 0.18.8 lr_scheduler bug; using plain DDP instead

### dataset
dataset: asr_correction
template: qwen3
cutoff_len: 2048
max_samples: 20000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4
dataset_dir : ${PROJECT_PATH}/script
tokenized_path: ${PROJECT_PATH}/dataset/tokenized_dataset/asr_correction

### output
output_dir: ${PROJECT_PATH}/trained_model/qwen3-8b-asr-adapter/
logging_steps: 10
save_steps: 300
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
